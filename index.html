<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Date Quest: Ghibli Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* ==============================
           THEME AND RESET (Ghibli Ocean)
           ============================== */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0;}
        body { 
            font-family: 'Press Start 2P', cursive; 
            background: #204e6c; /* Ghibli Deep Ocean */
            color: #222; /* Darker text for readability in boxes */
            overflow: hidden; 
            text-align: center; 
            font-size: 11px;
            width: 100vw;
            height: 100vh;
            line-height: 1.6;
        }
        
        /* CRT Effect */
        body::after { 
            content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 999;
            background: repeating-linear-gradient(to bottom, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 3px); 
        }

        /* Ambient Assets (Clouds and Petals, sitting below main content) */
        .cloud { position: absolute; width: 150px; height: 50px; background: rgba(255,255,255,0.8); border-radius: 50px; animation: drift 40s linear infinite; z-index: 1; opacity: 0.6; }
        .cloud::before, .cloud::after { content: ""; position: absolute; background: inherit; width: 75px; height: 60px; top: -25px; left: 25px; border-radius: 50%; }
        .cloud::after { left: 60px; width: 90px; height: 70px; }
        @keyframes drift { from { transform: translateX(-200px); } to { transform: translateX(110vw); } }

        .petal { position: absolute; top: -10px; font-size: 24px; animation: fall linear infinite; z-index: 5; opacity: 0.8; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        /* ==============================
           CORE UI LAYOUT (Splitscreen)
           ============================== */
        .screen { 
            display: none; 
            height: 100vh; 
            width: 100vw;
            flex-direction: row; /* Horizontal split */
            position: relative; 
            z-index: 10;
        }
        .active { display: flex; }

        /* Left side: The Environment and UI Dialogue Box */
        .game-area {
            flex: 1;
            height: 100%;
            background: #2e6b91; /* Mid-Ocean */
            border-right: 4px solid #fff;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.1) 0%, transparent 20%),
                linear-gradient(180deg, #1b3d54 0%, #204e6c 100%);
        }
        /* Underwater assets: bubbles and coral (pseudo-elements) */
        .game-area::before { content: "◌ ◌ ◌ ◌"; position: absolute; bottom: 10%; right: 5%; color: rgba(255,255,255,0.2); font-size: 20px; animation: bubbleUp 10s infinite; opacity: 0.3;}
        .game-area::after { content: "🪸"; position: absolute; bottom: 0; left: 10%; font-size: 40px; transform: scaleY(-1); opacity: 0.5;}
        @keyframes bubbleUp { 0% { transform: translateY(0); opacity: 0.3;} 50% { opacity: 0.6;} 100% { transform: translateY(-300px); opacity: 0;} }

        /* Right side: The Decision/Result Content Panel */
        .content-area {
            flex: 1;
            height: 100%;
            background: #fff;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #222;
        }

        /* ==============================
           DIALOGUE BOX UI (Ghibli Box)
           ============================== */
        /* Updated Dialogue Box based on your image reference */
        .pixel-box { 
            border: 4px solid #fff; 
            padding: 20px; 
            background: #fee3ec; /* Main Pink Body */
            box-shadow: 0 0 15px rgba(209,29,126, 0.4); 
            width: 90%; 
            max-width: 500px;
            border-radius: 15px; /* Softer, Ghibli edge */
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #d11d7e; /* Pink Text */
        }
        /* Bubble decorative border (pseudo-elements) */
        .pixel-box::before { content: "🫧"; position: absolute; bottom: -5px; right: -5px; font-size: 20px; color: #fff;}
        .pixel-box::after { content: "🫧"; position: absolute; top: 10px; right: 10px; font-size: 10px; color: rgba(255,255,255,0.5);}

        /* Dialogue Box Footer (The speech point) */
        .box-point {
            position: absolute;
            bottom: -30px;
            left: 50px;
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #fee3ec;
        }
