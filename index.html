<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Quest: Ponyo Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            padding: 0;
            font-family: 'Press Start 2P', cursive; 
            background-color: #5da399; 
            color: #fff; 
            overflow-x: hidden;
            text-align: center;
            min-height: 100vh;
        }

        /* Fixed Background */
        .ocean-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #7dc4b9 0%, #4a8c82 100%);
            z-index: -1;
        }

        /* Main Wrapper */
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .screen { 
            display: none; 
            width: 100%;
            max-width: 600px; /* Made slightly wider */
            animation: fadeIn 0.5s;
        }
        .active { display: block !important; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .pixel-box { 
            border: 8px solid #f8ead6; 
            padding: 35px; /* Increased padding */
            background: rgba(230, 95, 92, 0.95); 
            box-shadow: 10px 10px 0px #333; 
            border-radius: 4px;
        }

        /* Bigger Characters */
        .character-wrap { display: flex; justify-content: center; gap: 30px; margin-bottom: 25px; }
        .pixel-char { width: 60px; height: 60px; border: 4px solid #333; display: inline-block; }
        .sousuke { background: #ffcc33; position: relative; } 
        .sousuke::after { content: ''; position: absolute; bottom: 0; left:0; width: 100%; height: 50%; background: #2c5ba9; } 
        .ponyo { background: #ff6666; border-radius: 50% 50% 0 0; } 

        /* Bigger Text */
        p { font-size: 16px; line-height: 1.6; margin-bottom: 20px; }
        h3 { font-size: 18px; line-height: 1.5; }

        .option { 
            margin: 15px 0; 
            padding: 22px; 
            border: 4px solid #333; 
            background: #f8ead6; 
            color: #333;
            cursor: pointer; 
            font-size: 12px; /* Increased font size */
            line-height: 1.4;
            transition: 0.1s;
        }
        .option:active { transform: scale(0.95); background: #ffcc33; }

        /* Back Button Style */
        .back-btn {
            margin-top: 20px;
            padding: 12px;
            background: #4a8c82;
            color: white;
            border: 3px solid #333;
            font-size: 10px;
            cursor: pointer;
            display: inline-block;
        }
        .back-btn:active { background: #333; }

        .japan-res { background: #ffb7d5 !important; color: #d11d7e; border-color: #fff; }
        .vietnam-res { background: #8fd694 !important; color: #1e4d2b; border-color: #fff; }

        a { font-size: 12px; margin-top: 20px; display: block; color: inherit; word-break: break-all; font-weight: bold; }

        /* Bubbles */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid white;
            border-radius: 50%;
            bottom: -50px;
            pointer-events: none;
            animation: rise 10s infinite ease-in;
        }
        @keyframes rise {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-110vh); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="ocean-bg" id="ocean"></div>

    <div class="wrapper">
        <div id="intro" class="screen active">
            <div class="pixel-box">
                <div class="character-wrap">
                    <div class="pixel-char sousuke"></div>
                    <div class="pixel-char ponyo"></div>
                </div>
                <p>hi mi sosuke ! do u wanna go on a date with ponyo :3</p>
                <div class="option" onclick="next('country')">YEEHEES</div>
                <div class="option" onclick="next('no')">NOUNOU</div>
            </div>
        </div>

        <div id="no" class="screen">
            <div class="pixel-box">
                <div class="pixel-char ponyo" style="margin-bottom:15px;"></div>
                <p>nawwww pls think again!</p>
                <div class="option" onclick="next('intro')">GO BACK</div>
            </div>
        </div>

        <div id="country" class="screen">
            <div class="pixel-box">
                <p>where to, sosuke mi lab?</p>
                <div class="option" onclick="pick('japan')">JAPAN (sept trip foreshadow, pros: cheaper food!) 🇯🇵</div>
                <div class="option" onclick="pick('vietnam')">VIETNAM (trip down memory lane, pros: bun cha!) 🇻🇳</div>
